{% extends "blog/base.html" %}

{% block content %}

<h1>Autors</h1>

{% for author in authors %}
    <div class="card">
        <h2>
            <a href="{% url 'author-detail' author.id %}">
                {{ author.first_name }} {{ author.last_name }}
            </a>
        </h2>

        <p>{{ author.email }}</p>
    </div>
{% endfor %}

{% endblock %}
