{% extends "blog/base.html" %}
{% load static %}

{% block content %}

<h1>{{ tag.tag }}</h1>

<h2>Posts amb aquesta etiqueta</h2>

<div class="posts-grid">
    {% for post in tag.post_set.all %}
        <div class="card">

            <img src="{% static 'blog/imgs/' %}{{ post.image_name }}" 
                 alt="{{ post.title }}" 
                 width="250">

            <a href="{% url 'posts-detail-page' post.slug %}">
                <h3>{{ post.title }}</h3>
            </a>

            <p>{{ post.excerpt }}</p>

        </div>
    {% endfor %}
</div>

{% endblock %}
