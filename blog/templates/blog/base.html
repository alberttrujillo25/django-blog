<!DOCTYPE html>
<html lang="cat">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Blog Django{% endblock %}</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #f4f4f4;
            }

            .navbar {
                background-color: #1e3a8a;
                padding: 15px;
                display: flex;
                gap: 20px;
                align-items: center;
            }

            .navbar a {
                color: white;
                text-decoration: none;
                font-weight: bold;
            }

            .navbar a:hover {
                text-decoration: underline;
            }

            .container {
                padding: 20px;
            }

            .card {
                background: white;
                padding: 20px;
                margin-top: 15px;
                border-radius: 8px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            }

            .card-title {
                font-size: 20px;
                font-weight: bold;
                margin-bottom: 10px;
            }

            .posts-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
                margin-top: 20px;
                justify-content: center;
            }

            .posts-grid .card {
                margin-top: 0;
            }
        </style>
    </head>

    <body>
        <div class="navbar">
            <a href="{% url 'starting-page' %}">Inici</a>
            <a href="{% url 'posts' %}">Posts</a>
            <a href="{% url 'authors' %}">Autors</a>
            <a href="{% url 'tags' %}">Etiquetes</a>
        </div>
        
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </body>
</html>
