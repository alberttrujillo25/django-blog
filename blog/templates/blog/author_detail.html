{% extends "blog/base.html" %}
{% load static %}

{% block content %}

<h1>{{ author.first_name }} {{ author.last_name }}</h1>
<p>{{ author.email }}</p>

<h2>Posts de l'autor</h2>

<div class="posts-grid">
    {% for post in author.posts.all %}
        <div class="card">

            <img src="{% static 'blog/imgs/' %}{{ post.image_name }}" 
                 alt="{{ post.title }}" 
                 width="300">

            <a href="{% url 'posts-detail-page' post.slug %}">
                <h3>{{ post.title }}</h3>
            </a>

            <p>{{ post.excerpt }}</p>

        </div>
    {% endfor %}
</div>

{% endblock %}
